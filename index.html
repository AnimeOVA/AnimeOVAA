<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME OVA! - المتجر والاقتصاد الرقمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-main: #0a0a12;
            --bg-panel: #121225;
            --bg-item: #1c1c3a;
            --accent-neon: #ff0055;
            --accent-blue: #00d2ff;
            --text-main: #ffffff;
            --text-muted: #8b8ba7;
            --shadow-neon: 0 0 15px rgba(255, 0, 85, 0.6);
            --neo-glow: 0 0 12px #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        /* شاشة تسجيل الدخول */
        #auth-screen {
            background: radial-gradient(circle at center, var(--bg-item), var(--bg-main));
            flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-container {
            background: var(--bg-panel); width: 100%; max-width: 420px; padding: 35px 25px; border-radius: 24px;
            border: 2px solid var(--accent-neon); box-shadow: var(--shadow-neon); text-align: center;
        }
        .auth-logo { font-size: 3.5rem; font-weight: 900; color: var(--accent-neon); text-shadow: var(--shadow-neon); margin-bottom: 5px; }
        .auth-subtitle { color: var(--text-muted); font-size: 1rem; margin-bottom: 25px; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--accent-blue); }
        .input-group input {
            width: 100%; padding: 15px 45px 15px 15px; background: var(--bg-main); border: 1px solid var(--bg-item);
            border-radius: 12px; color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent-neon); }
        
        .btn-action {
            width: 100%; padding: 15px; background: linear-gradient(45deg, var(--accent-neon), #b3003b);
            color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: var(--shadow-neon); }
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }

        .auth-switch { margin-top: 15px; color: var(--accent-blue); cursor: pointer; font-size: 0.95rem; text-decoration: underline; }

        /* التطبيق الرئيسي */
        #app-screen { flex-direction: column; position: relative; }
        .app-header {
            height: 70px; background: var(--bg-panel); display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 2px solid var(--bg-item); z-index: 10;
        }
        .header-title { font-size: 1.8rem; font-weight: 900; color: var(--accent-neon); text-shadow: var(--shadow-neon); }
        .menu-toggle { font-size: 1.5rem; color: white; cursor: pointer; background: none; border: none; }

        .app-body { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* القائمة الجانبية */
        .sidebar {
            position: absolute; top: 0; bottom: 0; right: -300px; width: 300px; background: var(--bg-panel);
            transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); z-index: 99; display: flex; flex-direction: column;
            padding: 20px; border-left: 2px solid var(--bg-item);
        }
        .sidebar.open { right: 0; box-shadow: -5px 0 25px rgba(0,0,0,0.8); }

        .profile-card { background: var(--bg-item); padding: 15px; border-radius: 16px; text-align: center; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .profile-avatar { width: 60px; height: 60px; background: var(--bg-main); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 10px; border: 2px solid var(--accent-blue); }
        
        .room-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-small { padding: 10px; font-size: 0.85rem; border: none; border-radius: 8px; background: var(--bg-item); color: white; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; gap: 6px; }

        .list-container { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .list-item { padding: 12px 15px; background: var(--bg-main); margin-bottom: 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-right: 3px solid transparent; transition: 0.2s; }
        .list-item:hover, .list-item.active { border-right-color: var(--accent-neon); background: rgba(255, 0, 85, 0.1); }

        /* ساحة الألعاب العلوية */
        .game-zone { background: linear-gradient(135deg, #111126, #181836); padding: 15px 20px; border-bottom: 2px dashed var(--accent-blue); display: flex; flex-direction: column; gap: 12px; z-index: 5; transition: all 0.3s ease; }
        .game-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .game-info { display: flex; flex-direction: column; gap: 2px; }
        .game-title { font-size: 1rem; font-weight: bold; color: var(--accent-blue); display: flex; align-items: center; gap: 6px; }
        .game-players-text { font-size: 0.85rem; color: var(--text-main); }
        
        .btn-game-action { padding: 8px 16px; font-size: 0.85rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-join-style { background: linear-gradient(45deg, #00ffcc, var(--accent-blue)); color: #000; }
        .btn-vote-style { background: linear-gradient(45deg, #ff00ff, #7000ff); color: white; }
        .btn-leave-style { background: #b3003b; color: white; }

        /* واجهة لوحة الـ XO الحقيقية */
        .xo-board { display: grid; grid-template-columns: repeat(3, 60px); gap: 6px; justify-content: center; margin: 5px auto; }
        .xo-cell { width: 60px; height: 60px; background: var(--bg-main); border: 2px solid var(--bg-item); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.6rem; font-weight: 900; cursor: pointer; transition: 0.2s; user-select: none; }
        .xo-cell:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--accent-blue); }
        .xo-x { color: var(--accent-neon); text-shadow: var(--shadow-neon); }
        .xo-o { color: var(--accent-blue); text-shadow: 0 0 10px rgba(0, 210, 255, 0.6); }

        /* واجهة تحدي تخمين الأنمي الحقيقي */
        .anime-quiz-box { background: var(--bg-main); padding: 12px; border-radius: 12px; border: 1px solid var(--bg-item); width: 100%; max-width: 500px; margin: 0 auto; text-align: center; }
        .anime-clue { font-size: 0.95rem; font-weight: bold; color: #fff; margin-bottom: 10px; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 6px; }
        .anime-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .anime-opt-btn { padding: 10px; background: var(--bg-item); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .anime-opt-btn:hover { border-color: var(--accent-neon); background: rgba(255, 0, 85, 0.1); }

        /* واجهة الشات */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #07070d; }
        .chat-info-bar { background: rgba(18, 18, 37, 0.6); padding: 10px 20px; font-size: 0.9rem; border-bottom: 1px solid var(--bg-item); color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message-bubble { max-width: 80%; display: flex; flex-direction: column; }
        .message-content { padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 1rem; word-break: break-word; }
        .message-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        
        .msg-received { align-self: flex-start; }
        .msg-received .message-content { background: var(--bg-panel); border-bottom-right-radius: 4px; }
        .msg-sent { align-self: flex-end; }
        .msg-sent .message-content { background: var(--accent-neon); color: white; border-bottom-left-radius: 4px; }

        /* نافذة المتجر الفاخرة */
        .shop-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 18, 0.95); z-index: 999; justify-content: center; align-items: center; padding: 20px;
        }
        .shop-modal.active { display: flex; }
        .shop-content {
            background: var(--bg-panel); width: 100%; max-width: 520px; border-radius: 24px;
            border: 2px solid var(--accent-blue); padding: 25px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            max-height: 85vh; overflow-y: auto;
        }
        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; border-bottom: 1px solid var(--bg-item); padding-bottom: 10px; }
        .close-shop { background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }
        .shop-balance { background: var(--bg-main); padding: 12px; border-radius: 12px; text-align: center; font-weight: 900; margin-bottom: 20px; border: 1px dashed var(--accent-blue); font-size: 1.1rem; }
        .neo-coin-text { color: var(--accent-blue); text-shadow: var(--neo-glow); }
        
        .shop-item {
            display: flex; justify-content: space-between; align-items: center; background: var(--bg-item);
            padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.03);
        }
        .shop-item-info { display: flex; flex-direction: column; gap: 4px; }
        .btn-buy { padding: 8px 16px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--accent-blue); color: #000; transition: 0.2s; }
        .btn-buy:hover { transform: scale(1.05); box-shadow: var(--neo-glow); }
        .btn-buy.equipped { background: #22c55e; color: white; cursor: default; transform: none; box-shadow: none; }

        /* انيميشن وتوهج الرتب المتطورة */
        @keyframes uchihaPulse {
            from { text-shadow: 0 0 6px #ff0055, 0 0 12px #ff0055; }
            to { text-shadow: 0 0 15px #ff0055, 0 0 25px #ff0000; }
        }
        @keyframes stormPulse {
            from { text-shadow: 0 0 6px #00e5ff, 0 0 12px #00e5ff; }
            to { text-shadow: 0 0 18px #00e5ff, 0 0 28px #00a2ff; }
        }
        @keyframes legendSparkle {
            0% { text-shadow: 0 0 8px #ffd700, 0 0 15px #ffaa00; filter: brightness(1); }
            50% { text-shadow: 0 0 22px #fff, 0 0 32px #ffd700, 0 0 42px #ffaa00; filter: brightness(1.3); }
            100% { text-shadow: 0 0 8px #ffd700, 0 0 15px #ffaa00; filter: brightness(1); }
        }

        .rank-glow-uchiha { animation: uchihaPulse 1.2s infinite alternate; font-weight: 900; }
        .rank-glow-storm { animation: stormPulse 1s infinite alternate; font-weight: 900; }
        .rank-glow-legend { animation: legendSparkle 1.4s infinite ease-in-out; font-weight: 900; }

        .image-container { position: relative; display: inline-block; max-width: 100%; margin-top: 5px; cursor: pointer; }
        .media-img { max-width: 100%; max-height: 200px; border-radius: 12px; display: block; }
        .nsfw-blur { filter: blur(20px); transition: filter 0.4s ease; }
        .nsfw-warning { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 18, 0.88); display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--accent-neon); font-size: 0.85rem; font-weight: bold; text-align: center; border-radius: 12px; }

        /* شريط الكتابة */
        .input-bar { padding: 12px 15px; background: var(--bg-panel); border-top: 2px solid var(--bg-item); display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex: 1; padding: 14px 20px; background: var(--bg-main); border: 1px solid var(--bg-item); border-radius: 30px; color: white; outline: none; }
        .icon-btn { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; }
        .btn-send { background: var(--accent-neon); color: white; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 1.1rem; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow-neon); cursor: pointer; }

        .backdrop { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 90; }
        .backdrop.active { display: block; }
    </style>
</head>
<body>

    <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

    <div class="shop-modal" id="shop-modal">
        <div class="shop-content">
            <div class="shop-header">
                <h3><i class="fas fa-store" style="color: var(--accent-blue);"></i> متجر الرتب المتوهجة</h3>
                <button class="close-shop" onclick="closeShop()">&times;</button>
            </div>
            <div class="shop-balance">
                رصيدك الحالي: <span id="shop-neo-balance" class="neo-coin-text">0</span> <span class="neo-coin-text">⚡ نيو</span>
            </div>
            <div class="shop-items-grid"></div>
        </div>
    </div>

    <div class="shop-modal" id="redeem-modal">
        <div class="shop-content" style="max-width: 400px; border-color: var(--accent-neon); box-shadow: var(--shadow-neon);">
            <div class="shop-header">
                <h3><i class="fas fa-ticket-alt" style="color: var(--accent-neon);"></i> استبدال الأكواد السرية</h3>
                <button class="close-shop" onclick="closeRedeemModal()">&times;</button>
            </div>
            <div class="input-group" style="margin-top: 20px; margin-bottom: 20px;">
                <i class="fas fa-key" style="color: var(--accent-blue);"></i>
                <input type="text" id="promo-code-input" placeholder="أدخل الكود السري هنا..." style="text-align: center; text-transform: uppercase;">
            </div>
            <button class="btn-action" onclick="processPromoCode()">تأكيد الاستبدال ⚡</button>
        </div>
    </div>

    <div class="screen active" id="auth-screen">
        <div class="auth-container">
            <div class="auth-logo">ANIME OVA!</div>
            <div class="auth-subtitle" id="auth-title">تسجيل الدخول إلى حسابك</div>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username-input" placeholder="اسم المستخدم">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password-input" placeholder="كلمة السر">
            </div>

            <button class="btn-action" id="btn-submit" onclick="handleAuth()">دخول</button>
            <div class="auth-switch" id="auth-toggle" onclick="toggleAuthMode()">ليس لديك حساب؟ أنشئ حساباً الآن</div>
        </div>
    </div>

    <div class="screen" id="app-screen">
        <header class="app-header">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="header-title">ANIME OVA!</div>
            <div style="width: 24px;"></div> 
        </header>

        <div class="app-body">
            <aside class="sidebar" id="sidebar">
                <div class="profile-card">
                    <div class="profile-avatar"><i class="fas fa-user-ninja fa-2x" style="color: var(--accent-blue);"></i></div>
                    <div id="user-display-name" style="font-weight: bold; margin-bottom: 2px;">جاري التحميل...</div>
                    <div id="user-rank"></div>
                </div>

                <button class="btn-small" onclick="openShop()" style="width: 100%; margin-bottom: 10px; background: linear-gradient(45deg, #00d2ff, #0055ff); color: #000; font-weight: bold;">
                    <i class="fas fa-shopping-bag"></i> متجر رتب النيو
                </button>

                <button class="btn-small" onclick="openRedeemModal()" style="width: 100%; margin-bottom: 15px; background: linear-gradient(45deg, var(--accent-neon), #b3003b); color: #fff; font-weight: bold; border: 1px solid rgba(255,255,255,0.1);">
                    <i class="fas fa-ticket-alt"></i> استبدال اكواد
                </button>

                <div class="room-actions">
                    <button class="btn-small" onclick="createRoom()"><i class="fas fa-plus"></i> إنشاء غرفة</button>
                    <button class="btn-small" onclick="joinRoom()"><i class="fas fa-sign-in-alt"></i> دخول بـ ID</button>
                </div>

                <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px;">الغرف المتاحة</div>
                <div class="list-container" id="rooms-list">
                    <div class="list-item active" id="room-item-global_chat" onclick="switchRoom('global_chat', this)">
                        <i class="fas fa-globe" style="color: var(--accent-neon);"></i>
                        <span>الدردشة العالمية</span>
                    </div>
                </div>

                <button class="btn-small" onclick="logoutUser()" style="background: linear-gradient(45deg, var(--accent-neon), #b3003b); width: 100%; border: none; padding: 12px; font-weight: bold; margin-top: auto;">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </aside>

            <main class="chat-main">
                <div class="game-zone" id="game-zone-container"></div>
                <div class="chat-info-bar" id="current-room-title">
                    <span><i class="fas fa-hashtag"></i> الغرفة العالمية الحرة</span>
                </div>
                <div class="messages-container" id="messages-box"></div>

                <div class="input-bar">
                    <label class="icon-btn">
                        <i class="fas fa-image"></i>
                        <input type="file" id="image-loader" accept="image/*" style="display: none;" onchange="sendImage(this)">
                    </label>
                    <button class="icon-btn" onclick="insertEmoji('🔥')"><i class="fas fa-fire"></i></button>
                    <button class="icon-btn" onclick="insertEmoji('👑')"><i class="fas fa-crown"></i></button>
                    <input type="text" id="message-field" placeholder="اكتب رسالتك..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ733cL3hkxlXWkuxmGUkOvc1L0CH2NBw",
            authDomain: "mychat-73dee.firebaseapp.com",
            databaseURL: "https://mychat-73dee-default-rtdb.firebaseio.com",
            projectId: "mychat-73dee",
            storageBucket: "mychat-73dee.firebasestorage.app",
            messagingSenderId: "907008526259",
            appId: "1:907008526259:web:45e4fc8a93a918a19b2dc6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        
        let activeRoom = 'global_chat';
        let currentUser = null;
        let isLoginMode = true;
        let currentGameListener = null;

        const ranksPrices = { "صاعد": 0, "قرصان": 15, "ساياجين": 25, "المنهي": 55, "شبح الاوتشيها": 80, "قاهر العاصفة": 100, "قمة الاساطير": 200 };

        const animeQuestions = [
            { clue: "صاحب مقولة 'سأصبح ملك القراصنة!' ومحب للحم 🍖", options: ["لوفي", "غوكو", "ناروتو"], answer: "لوفي" },
            { clue: "سايان أُرسل للأرض، يحب الأكل والتطور الخارق، ومنافسه الأبدي فيجيتا ☄️", options: ["غوهان", "غوكو", "برولي"], answer: "غوكو" },
            { clue: "نينجا يحلم بأن يصبح الهوكاجي وييحب تناول الرامن 🦊", options: ["ساسكي", "كاكاشي", "ناروتو"], answer: "ناروتو" },
            { clue: "نائب قائد طاقم قبعة القش ومبارز مشهور بأسلوب الثلاثة سيوف والضياع ⚔️", options: ["زورو", "سانجي", "ميهوك"], answer: "زورو" }
        ];

        // Web Audio API Effects
        document.body.addEventListener('click', function() {
            if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
        }, { once: true });

        function playSFX(type) {
            try {
                if (!window.audioCtx) return;
                const osc = window.audioCtx.createOscillator();
                const gainNode = window.audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(window.audioCtx.destination);
                if (type === 'message') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, window.audioCtx.currentTime); gainNode.gain.setValueAtTime(0.1, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.12); osc.stop(window.audioCtx.currentTime + 0.12);
                } else if (type === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(750, window.audioCtx.currentTime); gainNode.gain.setValueAtTime(0.06, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.05); osc.stop(window.audioCtx.currentTime + 0.05);
                } else if (type === 'join') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, window.audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, window.audioCtx.currentTime + 0.08); gainNode.gain.setValueAtTime(0.12, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.2); osc.stop(window.audioCtx.currentTime + 0.2);
                } else if (type === 'game_start') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(440, window.audioCtx.currentTime); osc.frequency.setValueAtTime(880, window.audioCtx.currentTime + 0.1); gainNode.gain.setValueAtTime(0.12, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.3); osc.stop(window.audioCtx.currentTime + 0.3);
                } else if (type === 'game_end') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(550, window.audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(120, window.audioCtx.currentTime + 0.4); gainNode.gain.setValueAtTime(0.12, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.4); osc.stop(window.audioCtx.currentTime + 0.4);
                }
            } catch (e) { console.log(e); }
        }

                            ${amIIn ? `<button class="btn-game-action btn-leave-style" onclick="leaveGameQueue('${roomId}')">انسحاب</button>` : `<button class="btn-game-action btn-join-style" onclick="enterGameQueue('${roomId}')">قبول النزال ⚡</button>`}
                        </div>
                    `;
                } 
                else if (count === 2) {
                    const p1 = players[pIds[0]]; const p2 = players[pIds[1]];
                    const votes = gameData.votes || {}; const voteIds = Object.keys(votes);

                    if (!gameData.gameType) {
                        let xoVotes = Object.values(votes).filter(v => v === 'xo').length;
                        let animeVotes = Object.values(votes).filter(v => v === 'anime').length;

                        container.innerHTML = `
                            <div class="game-header-row">
                                <div class="game-info">
                                    <span class="game-title" style="color:var(--accent-blue);">🗳️ نافذة التصويت واختيار اللعبة (${voteIds.length}/2)</span>
                                    <span class="game-players-text">${p1.name} ضد ${p2.name} .. صوتوا للبدء!</span>
                                </div>
                                <button class="btn-game-action btn-leave-style" onclick="leaveGameQueue('${roomId}')">إلغاء</button>
                            </div>

                                <button class="btn-game-action btn-join-style" onclick="submitGameVote('${roomId}', 'xo')">لعبة XO (${xoVotes})</button>
                                <button class="btn-game-action btn-vote-style" onclick="submitGameVote('${roomId}', 'anime')">تخمين الأنمي (${animeVotes})</button>
                            </div>
                        `;

                        if (voteIds.length === 2 && !gameData.processingVote) {
                            database.ref('game_rooms/' + roomId).update({ processingVote: true });
                            let chosen = xoVotes >= animeVotes ? 'xo' : 'anime';
                            let initUpdate = { gameType: chosen, status: "playing" };
                            if (chosen === 'xo') {
                                initUpdate.board = Array(9).fill(""); initUpdate.turn = pIds[0];
                            } else {
                                initUpdate.currentQuestion = 0; initUpdate.scores = { [pIds[0]]: 0, [pIds[1]]: 0 };

        // تشغيل لعبة الـ XO المتزامنة والمكافآت
        function renderRealXOGame(roomId, gameData, pIds, players) {
            const container = document.getElementById('game-zone-container');
            const board = gameData.board || Array(9).fill("");
            const isMyTurn = gameData.turn === currentUser.uid;

            let statusText = gameData.winner ? 
                (gameData.winner === 'tie' ? "🤝 تعادل أسطوري!" : `🏆 الفائز: ${players[gameData.winner] ? players[gameData.winner].name : 'مجهول'}`) : 
                (isMyTurn ? "🔥 دورك الآن! العب حركتك" : "⏳ انتظر حركة الخصم...");

            let boardHTML = `<div class="xo-board">`;
            for (let i = 0; i < 9; i++) {
                let cellClass = board[i] === 'X' ? 'xo-cell xo-x' : (board[i] === 'O' ? 'xo-cell xo-o' : 'xo-cell');
                boardHTML += `<div class="${cellClass}" onclick="handleXOMove('${roomId}', ${i})">${board[i]}</div>`;
            }
            boardHTML += `</div>`;

            container.innerHTML = `
                <div class="game-header-row">
                    <div class="game-info">
                        <span class="game-title" style="color:var(--accent-neon);">⭕ لعبة XO المباشرة ❌</span>
                        <span class="game-players-text" style="font-weight:bold; color:#fff;">${statusText} (${players[pIds[0]].name}: X | ${players[pIds[1]].name}: O)</span>
                    </div>
                    <button class="btn-game-action btn-leave-style" onclick="leaveGameQueue('${roomId}')">إنهاء</button>
                </div>
                ${boardHTML}
            `;
        }

        function handleXOMove(roomId, index) {
            const gameData = window.activeGameData || {};
            const players = gameData.players || {};
            const pIds = Object.keys(players);
            if (pIds.length < 2 || !gameData.turn || gameData.winner) return;

            if (gameData.turn !== currentUser.uid) return;
            const board = gameData.board ? [...gameData.board] : Array(9).fill("");
            if (board[index] !== "") return;

            playSFX('click');
            const mySymbol = currentUser.uid === pIds[0] ? 'X' : 'O';
            board[index] = mySymbol;

            let nextTurn = currentUser.uid === pIds[0] ? pIds[1] : pIds[0];
            let winner = null;
            const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            
            for(let pattern of winPatterns) {
                if(board[pattern[0]] && board[pattern[0]] === board[pattern[1]] && board[pattern[0]] === board[pattern[2]]) {
                    winner = currentUser.uid;
                }
            }
            if(!winner && !board.includes("")) winner = 'tie';

            let updates = { board: board, turn: nextTurn };
            if(winner) { 
                updates.winner = winner; playSFX('game_start'); 
                if (winner !== 'tie') {
                    database.ref('users/' + winner + '/neo').transaction((currentNeo) => {
                        return (currentNeo || 0) + 1;
                    });
                }
            }
            database.ref('game_rooms/' + roomId).update(updates);
        }

        // تشغيل لعبة تخمين الأنمي وتوزيع المكافأة عند النهاية
        function renderRealAnimeGame(roomId, gameData, pIds, players) {
            const container = document.getElementById('game-zone-container');
            const qIndex = gameData.currentQuestion || 0;
            const scores = gameData.scores || {};

            if (qIndex >= animeQuestions.length) {
                let s1 = scores[pIds[0]] || 0; let s2 = scores[pIds[1]] || 0;
                let finalWinner = s1 > s2 ? players[pIds[0]].name : (s2 > s1 ? players[pIds[1]].name : "تعادل");

                container.innerHTML = `
                    <div class="game-header-row">
                        <div class="game-info">
                            <span class="game-title" style="color:var(--accent-blue);">🏁 انتهى التحدي التخميني!</span>
                            <span class="game-players-text">النتيجة النهائية: الفائز بالتحدي هو <b style="color:var(--accent-neon);">${finalWinner}</b></span>
                        </div>
                        <button class="btn-game-action btn-leave-style" onclick="leaveGameQueue('${roomId}')">إغلاق اللعبة</button>
                    </div>
                `;
                return;
            }

            const currentQ = animeQuestions[qIndex];
            let optionsHTML = '';
            currentQ.options.forEach(opt => {
                optionsHTML += `<button class="anime-opt-btn" onclick="submitAnimeAnswer('${roomId}', ${qIndex}, '${opt}', '${currentQ.answer}')">${opt}</button>`;
            });

            container.innerHTML = `
                <div class="game-header-row">
                    <div class="game-info">
                        <span class="game-title" style="color:var(--accent-blue);">👤 تحدي تخمين الشخصية المتزامن</span>
                        <span class="game-players-text">النقاط حية 📊 [ ${players[pIds[0]].name}: ${scores[pIds[0]]||0} ] ضد [ ${players[pIds[1]].name}: ${scores[pIds[1]]||0} ]</span>
                    </div>
                    <button class="btn-game-action btn-leave-style" onclick="leaveGameQueue('${roomId}')">انسحاب</button>
                </div>
                <div class="anime-quiz-box">
                    <div class="anime-clue">السؤال ${qIndex + 1}: ${currentQ.clue}</div>
                    <div class="anime-options">${optionsHTML}</div>
                </div>
            `;
        }

        function submitAnimeAnswer(roomId, questionIdx, chosenOpt, correctAns) {
            playSFX('click');
            database.ref('game_rooms/' + roomId).once('value', (snap) => {
                const data = snap.val() || {};
                if (data.currentQuestion !== questionIdx) return;

                let scores = data.scores || {};
                const pIds = Object.keys(data.players || {});
                
                if (chosenOpt === correctAns) {
                    scores[currentUser.uid] = (scores[currentUser.uid] || 0) + 1;
                    playSFX('game_start');
                } else {
                    playSFX('game_end');
                }

                let updates = { currentQuestion: questionIdx + 1, scores: scores };

                if (questionIdx + 1 >= animeQuestions.length) {
                    let s1 = scores[pIds[0]] || 0; let s2 = scores[pIds[1]] || 0;
                    if (chosenOpt === correctAns) {
                        if (currentUser.uid === pIds[0]) s1++; else s2++;
                    }
                    let finalWinnerId = s1 > s2 ? pIds[0] : (s2 > s1 ? pIds[1] : null);
                    if (finalWinnerId && !data.rewarded) {
                        updates.rewarded = true;
                        database.ref('users/' + finalWinnerId + '/neo').transaction((currentNeo) => {
                            return (currentNeo || 0) + 1;
                        });
                    }
                }
                database.ref('game_rooms/' + roomId).update(updates);
            });
        }

        // دالة معالجة الأكواد البرمجية الفورية المشفرة
        async function processPromoCode() {
            const inputField = document.getElementById('promo-code-input');
            const code = inputField.value.trim().toUpperCase();

            if (!code) return alert("الرجاء إدخال الكود أولاً!");
            if (!currentUser) return alert("يجب تسجيل الدخول لاستبدال الكود!");

            playSFX('click');

            if (code === "GG90ROMA") {
                const todayStr = new Date().toISOString().split('T')[0]; // صيغة YYYY-MM-DD الثابتة
                const lastUsedDate = window.currentUserData ? window.currentUserData.lastDailyCodeDate : null;

                if (lastUsedDate === todayStr) {
                    alert("❌ لقد استهلكت هذا الكود اليوم بالفعل! عد غداً للحصول على 1400 نيو جديدة.");
                    return;
                }

                database.ref('users/' + currentUser.uid).transaction((currentData) => {
                    if (!currentData) currentData = { neo: 0, rank: "صاعد" };
                    if (currentData.neo === undefined) currentData.neo = 0;

                    currentData.neo += 1400;
                    currentData.lastDailyCodeDate = todayStr; // تسجيل تاريخ اليوم
                    return currentData;
                }, (error, committed) => {
                    if (error) {
                        alert("حدث خطأ أثناء معالجة الكود.");
                    } else if (committed) {
                        playSFX('join');
                        alert("🎉 مبارك! تم شحن 1400 نيو فوراً إلى رصيدك.");
                        closeRedeemModal();
                    }
                });
            } 
            // 2. الكود الثاني: رتبة وميزات الأدمن السري الحية
            else if (code === "GG14ROMASS") {
                database.ref('users/' + currentUser.uid + '/isAdmin').set(true).then(() => {
                    playSFX('join');
                    alert("👑 تم منحك صلاحيات الأدمن السري بنجاح! ظهرت لك الآن أزرار طرد المشاغبين ومسح الشات.");
                    closeRedeemModal();
                    listenToRoomMessages(activeRoom); // إعادة بناء فوري لتحديث أزرار الباند في الشات الحالي دون ريفريش
                }).catch(() => {
                    alert("فشل ترقية الصلاحية.");
                });
            } 
            else {
                alert("❌ هذا الكود السري غير صحيح أو منتهي الصلاحية!");
            }
        }

        // دالة طرد وحظر أي مستخدم نهائياً (متاحة للأدمن فقط)
        function banUserAccount(targetUid, targetUsername) {
            if (!window.currentUserIsAdmin) return;
            if (confirm(`🚫 هل أنت متأكد تماماً من إعطاء باند وطرد [${targetUsername}] نهائياً من النظام؟`)) {
                playSFX('game_end');
                database.ref('banned_users/' + targetUid).set({
                    username: targetUsername,
                    bannedBy: currentUser.uid,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    alert(`🔨 تم حظر ${targetUsername} بنجاح وطرده خارج السيرفر.`);
                }).catch((err) => alert("حدث خطأ: " + err.message));
            }
        }

        // دالة مسح جميع الرسائل السابقة بالكامل من قاعدة البيانات (متاحة للأدمن فقط)
        function clearGlobalMessages() {
            if (!window.currentUserIsAdmin) return;
            if (confirm("🚨 تحذير: هل تريد مسح جميع رسائل الدردشة العالمية بالكامل؟ (لا يمكن التراجع!)")) {
                playSFX('game_end');
                database.ref('rooms/global_chat').remove().then(() => {
                    alert("🧹 تم تفريغ ومسح الشات العام بنجاح!");
                    document.getElementById('messages-box').innerHTML = '';
                }).catch((err) => alert("فشل المسح: " + err.message));
            }
        }

        // --- دوال الشات والرسائل المتزامنة ---
        function listenToRoomMessages(roomId) {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            database.ref('rooms/' + roomId).off();
            database.ref('rooms/' + roomId).on('child_added', function(snapshot) {
                const msg = snapshot.val();
                appendBubble(msg);
                if (msg.timestamp && msg.timestamp > Date.now() - 3000) {
                    if (msg.userId !== currentUser.uid) playSFX('message');
                }
            });
        }

        function appendBubble(msg) {
            const box = document.getElementById('messages-box');
            const isMe = msg.userId === currentUser.uid; 
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
            
            let contentHTML = msg.body;
            if (msg.type === 'image') {
                contentHTML = `
                    <div class="image-container" onclick="revealImage(this)">
                        <img src="${msg.body}" class="media-img nsfw-blur">
                        <div class="nsfw-warning">
                            <i class="fas fa-eye-slash fa-lg" style="margin-bottom:5px;"></i><span>صورة محجوبة</span>
                        </div>
                    </div>`;
            }

            const rTag = getRankHTML(msg.rank || "صاعد");
            
            // حقن زر حظر الأدمن بجانب رسائل الآخرين تلقائياً إذا كان المستخدم أدمن
            let banBtnHTML = "";
            if (window.currentUserIsAdmin && !isMe) {
                banBtnHTML = `<button onclick="banUserAccount('${msg.userId}', '${msg.sender}')" style="background:none; border:none; color:var(--accent-neon); margin-right:8px; cursor:pointer;" title="حظر المستخدم"><i class="fas fa-gavel"></i></button>`;
            }

            bubble.innerHTML = `
                <div class="message-meta">${rTag} <span>${isMe ? 'أنت' : msg.sender}</span> ${banBtnHTML}</div>
                <div class="message-content">${contentHTML}</div>
            `;
            box.appendChild(bubble); box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const field = document.getElementById('message-field');
            let text = field.value.trim();
            if(!text || !currentUser) return;

            playSFX('click');
            const myCurrentRank = (window.currentUserData && window.currentUserData.rank) ? window.currentUserData.rank : "صاعد";

            database.ref('rooms/' + activeRoom).push({
                userId: currentUser.uid,
                sender: currentUser.displayName || currentUser.email.split('@')[0],
                rank: myCurrentRank, 
                type: 'text',
                body: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            field.value = '';
        }

        function sendImage(input) {
            if(!currentUser) return; const file = input.files[0]; if(!file) return;
            playSFX('click');
            const reader = new FileReader();
            reader.onload = function(e) {
                const myCurrentRank = (window.currentUserData && window.currentUserData.rank) ? window.currentUserData.rank : "صاعد";
                database.ref('rooms/' + activeRoom).push({
                    userId: currentUser.uid,
                    sender: currentUser.displayName || currentUser.email.split('@')[0],
                    rank: myCurrentRank,
                    type: 'image',
                    body: e.target.result,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            };
            reader.readAsDataURL(file);
        }

        function insertEmoji(emoji) {
            playSFX('click'); const field = document.getElementById('message-field');
            field.value += emoji; field.focus();
        }

        function createRoom() {
            playSFX('click'); const id = 'Room_' + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('joined_private_' + id, 'true');
            alert("تم إنشاء غرفة خاصة! الـ ID: " + id);
            database.ref('rooms_list').push({ id: id, creator: currentUser.uid });
            switchRoom(id);
        }

        function joinRoom() {
            playSFX('click'); const id = prompt("أدخل الـ ID الخاص بالغرفة الخاصة:");
            if(id) { localStorage.setItem('joined_private_' + id, 'true'); playSFX('join'); switchRoom(id); }
        }

        function listenToGlobalRooms() {
            database.ref('rooms_list').on('child_added', function(snapshot) {
                const roomData = snapshot.val();
                if (roomData && roomData.id && roomData.id !== 'global_chat') {
                    const isCreator = roomData.creator === currentUser.uid;
                    const hasAccess = localStorage.getItem('joined_private_' + roomData.id) === 'true';

                    if (isCreator || hasAccess) {
                        if (!document.getElementById(`room-item-${roomData.id}`)) {
                            const list = document.getElementById('rooms-list');
                            const item = document.createElement('div'); item.className = "list-item";
                            item.id = `room-item-${roomData.id}`;
                            item.innerHTML = `<i class="fas fa-hashtag" style="color:var(--accent-blue);"></i> <span>غرفة خاصة: ${roomData.id}</span>`;
                            item.onclick = function() { switchRoom(roomData.id, item); };
                            list.appendChild(item);
                        }
                    }
                }
            });
        }

        function switchRoom(id, element) {
            playSFX('click'); activeRoom = id;
            
            // حقن هيدر الشات مع تفعيل فوري لزر مسح الشات للأدمن في الغرفة العامة فقط
            let titleHTML = `<span><i class="fas fa-hashtag"></i> ساحة: ${id === 'global_chat' ? 'الدردشة العالمية الحرة' : id}</span>`;
            let clearBtnHTML = `<button id="admin-clear-chat" class="btn-small" onclick="clearGlobalMessages()" style="display: ${ (window.currentUserIsAdmin && id === 'global_chat') ? 'block' : 'none' }; background: #b3003b; border-color: var(--accent-neon); padding: 5px 12px; font-size: 0.8rem;">
                <i class="fas fa-trash-alt"></i> مسح الشات العام
            </button>`;
            
            document.getElementById('current-room-title').innerHTML = titleHTML + clearBtnHTML;

            document.querySelectorAll('.list-item').forEach(item => item.classList.remove('active'));
            if(element) element.classList.add('active');
            else { let el = document.getElementById(`room-item-${id}`); if(el) el.classList.add('active'); }
            
            listenToRoomMessages(id); setupGameZone(id);
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        }

        function revealImage(container) {
            playSFX('click'); const img = container.querySelector('.media-img'); const warning = container.querySelector('.nsfw-warning');
            if (img && img.classList.contains('nsfw-blur')) { img.classList.remove('nsfw-blur'); if (warning) warning.style.display = 'none'; }
        }

        function toggleSidebar() {
            playSFX('click'); document.getElementById('sidebar').classList.toggle('open'); document.getElementById('backdrop').classList.toggle('active');
        }
    </script>
</body>
</html>
