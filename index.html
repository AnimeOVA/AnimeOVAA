<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineChat Hub - سيرفر المحادثة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            /* ألوان واجهة ماين كرافت الكلاسيكية */
            --mc-bg-dirt: #5c3b21;
            --mc-ui-base: #c6c6c6;
            --mc-ui-dark: #555555;
            --mc-ui-light: #ffffff;
            --mc-border-hover: #ffffff;
            --mc-text-dark: #3f3f3f;
            --mc-text-light: #ffffff;
            --mc-chat-bg: rgba(0, 0, 0, 0.5);
            --mc-diamond: #55ffff;
            --mc-gold: #ffaa00;
            --mc-red: #ff5555;
            --mc-green: #55ff55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        
        body { 
            background-color: #1d1d1d; 
            background-image: 
                linear-gradient(45deg, #4b301a 25%, transparent 25%, transparent 75%, #4b301a 75%, #4b301a),
                linear-gradient(45deg, #4b301a 25%, transparent 25%, transparent 75%, #4b301a 75%, #4b301a);
            background-size: 32px 32px;
            background-position: 0 0, 16px 16px;
            color: var(--mc-text-light); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .pixel-font { font-family: 'Pixelify Sans', 'Cairo', sans-serif; }

        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        /* ستايل أزرار ماين كرافت */
        .mc-btn {
            background-color: #7b7b7b;
            border: 2px solid;
            border-color: var(--mc-ui-light) var(--mc-ui-dark) var(--mc-ui-dark) var(--mc-ui-light);
            color: white;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 2px 2px 0px #383838;
            cursor: pointer;
            transition: 0.1s;
        }
        .mc-btn:hover { background-color: #8b8b8b; border-color: var(--mc-border-hover) var(--mc-ui-dark) var(--mc-ui-dark) var(--mc-border-hover); }
        .mc-btn:active {
            border-color: var(--mc-ui-dark) var(--mc-ui-light) var(--mc-ui-light) var(--mc-ui-dark);
            background-color: #6b6b6b;
            padding-top: 14px; padding-bottom: 10px;
        }
        .mc-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .mc-btn-action { background-color: #3e8528; border-color: #5cbf3c #1d4013 #1d4013 #5cbf3c; }
        .mc-btn-action:hover { background-color: #4b9f31; }
        
        /* تعديل الزر الأحمر ليكون بارزاً وأكثر وضوحاً */
        .mc-btn-danger { background-color: #c92a2a; border-color: #ff5555 #5c1010 #5c1010 #ff5555; color: white; text-shadow: 2px 2px 0px #3f0909; }
        .mc-btn-danger:hover { background-color: #e03131; border-color: #ff7777 #7a1515 #7a1515 #ff7777; }

        /* ستايل النوافذ */
        .mc-panel {
            background-color: var(--mc-ui-base);
            border: 4px solid;
            border-color: var(--mc-ui-light) var(--mc-ui-dark) var(--mc-ui-dark) var(--mc-ui-light);
            color: var(--mc-text-dark);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #auth-screen { flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .auth-container { width: 100%; max-width: 420px; padding: 25px; text-align: center; }
        .auth-logo { font-size: 2.8rem; font-weight: 900; color: #ffeb3b; text-shadow: 3px 3px 0 #3e3e3e; margin-bottom: 5px; }
        .auth-subtitle { color: var(--mc-text-dark); font-weight: bold; margin-bottom: 25px; }
        
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; background: #000; border: 2px solid #383838;
            color: #fff; font-size: 1.1rem; outline: none; border-radius: 0;
            border-top-color: #222; border-left-color: #222; border-bottom-color: #666; border-right-color: #666;
        }
        .input-group input:focus { border-color: var(--mc-ui-light); }
        .auth-switch { margin-top: 15px; color: #0000aa; cursor: pointer; font-weight: bold; text-decoration: underline; }

        #app-screen { flex-direction: column; position: relative; }
        .app-header {
            height: 60px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 3px solid #333; z-index: 10;
        }
        .header-title { font-size: 1.5rem; font-weight: bold; color: #55ff55; text-shadow: 2px 2px 0px #000; }
        .menu-toggle { font-size: 1.5rem; color: white; cursor: pointer; background: none; border: none; text-shadow: 2px 2px 0 #000; }

        .app-body { flex: 1; display: flex; position: relative; overflow: hidden; }

        /* تعديل القائمة الجانبية (Sidebar) لتدعم التمرير حتى لا تختفي الأزرار السفلية */
        .sidebar {
            position: absolute; top: 0; bottom: 0; right: -320px; width: 320px;
            transition: 0.3s; z-index: 99; display: flex; flex-direction: column; padding: 15px;
            overflow-y: auto; /* إضافة سكرول مهم جداً */
            padding-bottom: 25px;
        }
        .sidebar.open { right: 0; }

        .profile-card { background: #8b8b8b; border: 2px solid #555; padding: 15px; text-align: center; margin-bottom: 15px; border-color: var(--mc-ui-dark) var(--mc-ui-light) var(--mc-ui-light) var(--mc-ui-dark); }
        .profile-avatar { font-size: 2.5rem; margin-bottom: 10px; color: #fff; text-shadow: 2px 2px 0 #000; }
        
        .room-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }

        /* تعديل مظهر قائمة السيرفرات لتكون واضحة وبارزة */
        .list-container { 
            flex: 1; min-height: 120px; overflow-y: auto; margin-bottom: 15px; 
            border: 3px inset #333; background: #1a1a1a; padding: 5px; 
        }
        .list-item { 
            padding: 10px; background: #555; margin-bottom: 5px; border: 2px solid;
            border-color: #888 #222 #222 #888;
            cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; text-shadow: 1px 1px 0 #000; font-weight: bold;
        }
        .list-item:hover { background: #666; border-color: var(--mc-border-hover); }
        .list-item.active { background: #3e8528; border-color: #5cbf3c #1d4013 #1d4013 #5cbf3c; }

        .game-zone { background: #222; padding: 10px 15px; border-bottom: 3px solid #555; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .game-header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .game-info { display: flex; flex-direction: column; }
        .game-title { font-size: 1rem; font-weight: bold; color: var(--mc-gold); }
        .game-players-text { font-size: 0.85rem; color: #aaa; }
        
        .btn-game-action { padding: 8px 12px; font-size: 0.85rem; }

        .xo-board { display: grid; grid-template-columns: repeat(3, 60px); gap: 4px; justify-content: center; margin: 5px auto; }
        .xo-cell { width: 60px; height: 60px; background: #7b7b7b; border: 2px solid #333; display: flex; justify-content: center; align-items: center; font-size: 2rem; cursor: pointer; border-color: var(--mc-ui-dark) var(--mc-ui-light) var(--mc-ui-light) var(--mc-ui-dark); }
        .xo-cell:hover { background: #8b8b8b; }
        .xo-x { color: var(--mc-red); text-shadow: 2px 2px 0 #000; }
        .xo-o { color: var(--mc-diamond); text-shadow: 2px 2px 0 #000; }

        .anime-quiz-box { background: #333; padding: 12px; border: 2px solid #555; width: 100%; max-width: 500px; margin: 0 auto; text-align: center; }
        .anime-clue { font-size: 1rem; font-weight: bold; color: #fff; margin-bottom: 10px; text-shadow: 1px 1px 0 #000; }
        .anime-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .mining-area { background: #222; border: 2px solid #000; padding: 10px; text-align: center; margin-bottom: 15px; }
        .mining-block { 
            display: inline-block; width: 50px; height: 50px; 
            background-color: #79553a;
            background-image: 
                linear-gradient(45deg, #5c3b21 25%, transparent 25%, transparent 75%, #5c3b21 75%, #5c3b21), 
                linear-gradient(45deg, #5c3b21 25%, transparent 25%, transparent 75%, #5c3b21 75%, #5c3b21);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            cursor: pointer; transition: 0.1s; border: 2px solid #000; 
        }
        .mining-block:active { transform: scale(0.9); filter: brightness(0.7); }

        .chat-main { 
            flex: 1; display: flex; flex-direction: column; 
            background-color: #2b2b2b;
            background-image: 
                linear-gradient(45deg, #1f1f1f 25%, transparent 25%, transparent 75%, #1f1f1f 75%, #1f1f1f), 
                linear-gradient(45deg, #1f1f1f 25%, transparent 25%, transparent 75%, #1f1f1f 75%, #1f1f1f);
            background-size: 32px 32px; 
            background-position: 0 0, 16px 16px; 
        }
        .chat-info-bar { background: rgba(0, 0, 0, 0.7); padding: 8px 15px; font-size: 0.9rem; border-bottom: 2px solid #333; color: #fff; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        .messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message-bubble { display: flex; flex-direction: column; max-width: 100%; margin-bottom: 2px; }
        .message-content { font-size: 1rem; color: white; word-break: break-word; text-shadow: 1px 1px 0px #000; line-height: 1.4; display: inline-block; }
        .message-meta { font-size: 0.85rem; color: #aaa; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; text-shadow: 1px 1px 0px #000; font-weight: bold; }
        
        .msg-received .message-content { background: var(--mc-chat-bg); padding: 4px 8px; border-left: 3px solid #555; }
        .msg-sent .message-content { background: var(--mc-chat-bg); padding: 4px 8px; border-right: 3px solid var(--mc-green); color: #fff; }

        .shop-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 999; justify-content: center; align-items: center; padding: 20px;
        }
        .shop-modal.active { display: flex; }
        .shop-content { width: 100%; max-width: 520px; padding: 20px; max-height: 85vh; overflow-y: auto; }
        .shop-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .close-shop { background: none; border: none; color: #555; font-size: 2rem; cursor: pointer; text-shadow: 1px 1px 0 #fff; }
        .close-shop:hover { color: #000; }
        
        .shop-balance { background: #333; color: white; padding: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; border: 2px inset #000; font-size: 1.1rem; }
        .diamond-text { color: var(--mc-diamond); text-shadow: 1px 1px 0 #000; }
        
        .shop-item {
            display: flex; justify-content: space-between; align-items: center; background: #8b8b8b;
            padding: 10px; margin-bottom: 8px; border: 2px solid; border-color: var(--mc-ui-dark) var(--mc-ui-light) var(--mc-ui-light) var(--mc-ui-dark);
        }
        .shop-item-info { display: flex; flex-direction: column; gap: 4px; color: #fff; text-shadow: 1px 1px 0 #000; }

        @keyframes glowDiamond { 0% { text-shadow: 0 0 5px #55ffff; } 100% { text-shadow: 0 0 15px #ffffff, 0 0 20px #55ffff; } }
        @keyframes glowNetherite { 0% { text-shadow: 0 0 5px #3a2e3a; color: #5c4a5c; } 100% { text-shadow: 0 0 10px #745f74; color: #8e738e; } }
        @keyframes glowBedrock { 0% { text-shadow: 0 0 5px #000, 0 0 10px #ff0000; filter: contrast(1.2); } 100% { text-shadow: 0 0 15px #000, 0 0 25px #aa0000; filter: contrast(1.5); } }

        .rank-glow-diamond { animation: glowDiamond 1s infinite alternate; font-weight: 900; color: var(--mc-diamond); }
        .rank-glow-netherite { animation: glowNetherite 1.5s infinite alternate; font-weight: 900; }
        .rank-glow-bedrock { animation: glowBedrock 0.5s infinite alternate; font-weight: 900; color: #fff; }

        .image-container { position: relative; display: inline-block; max-width: 100%; margin-top: 5px; cursor: pointer; border: 3px solid #000; }
        .media-img { max-width: 100%; max-height: 200px; display: block; image-rendering: pixelated; }
        
        .input-bar { padding: 10px; background: rgba(0,0,0,0.8); border-top: 3px solid #333; display: flex; gap: 8px; align-items: center; }
        .input-bar input {
            flex: 1; padding: 12px; background: #000; border: 2px solid #555; border-radius: 0;
            color: white; outline: none; border-top-color: #222; border-left-color: #222;
        }
        .icon-btn { background: none; border: none; color: #aaa; font-size: 1.4rem; cursor: pointer; text-shadow: 1px 1px 0 #000; transition: 0.1s; }
        .icon-btn:hover { color: #fff; transform: scale(1.1); }
        
        .backdrop { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 90; }
        .backdrop.active { display: block; }

        .mc-stats { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.8rem; color: #fff; text-shadow: 1px 1px 0 #000; }
    </style>
</head>
<body>

    <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

    <div class="shop-modal" id="shop-modal">
        <div class="shop-content mc-panel">
            <div class="shop-header">
                <h3 class="pixel-font" style="color: #333; text-shadow: 1px 1px 0 #fff;"><i class="fas fa-box"></i> متجر السيرفر</h3>
                <button class="close-shop" onclick="closeShop()">&times;</button>
            </div>
            <div class="shop-balance">
                المخزون الحالي: <span id="shop-neo-balance" class="diamond-text">0</span> <span class="diamond-text">💎 ألماس</span>
            </div>
            <div class="shop-items-grid"></div>
        </div>
    </div>

    <div class="shop-modal" id="redeem-modal">
        <div class="shop-content mc-panel" style="max-width: 400px;">
            <div class="shop-header">
                <h3 class="pixel-font" style="color: #333; text-shadow: 1px 1px 0 #fff;"><i class="fas fa-tag"></i> إدخال كود سري (Name Tag)</h3>
                <button class="close-shop" onclick="closeRedeemModal()">&times;</button>
            </div>
            <div class="input-group" style="margin-top: 20px; margin-bottom: 20px;">
                <input type="text" id="promo-code-input" placeholder="أدخل الكود هنا..." style="text-align: center; text-transform: uppercase;">
            </div>
            <button class="mc-btn mc-btn-action" style="width: 100%;" onclick="processPromoCode()">استبدال 💎</button>
        </div>
    </div>

    <div class="screen active" id="auth-screen">
        <div class="auth-container mc-panel">
            <div class="auth-logo pixel-font">MINECRAFT HUB</div>
            <div class="auth-subtitle pixel-font" id="auth-title">تسجيل الدخول للسيرفر</div>
            
            <div class="input-group">
                <input type="text" id="username-input" placeholder="اسم اللاعب (Player Name)">
            </div>
            
            <div class="input-group">
                <input type="password" id="password-input" placeholder="كلمة المرور (Password)">
            </div>

            <button class="mc-btn mc-btn-action" style="width: 100%; margin-top: 10px;" id="btn-submit" onclick="handleAuth()">دخول اللعبة</button>
            <div class="auth-switch pixel-font" id="auth-toggle" onclick="toggleAuthMode()">لاعب جديد؟ أنشئ حساباً</div>
        </div>
    </div>

    <div class="screen" id="app-screen">
        <header class="app-header">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="header-title pixel-font">MINECHAT</div>
            <div style="width: 24px;"></div> 
        </header>

        <div class="app-body">
            <aside class="sidebar mc-panel" id="sidebar">
                <div class="profile-card">
                    <div class="profile-avatar"><i class="fas fa-cube"></i></div>
                    <div id="user-display-name" style="font-weight: bold; margin-bottom: 2px; color: #fff; text-shadow: 2px 2px 0 #000; font-size: 1.2rem;">جاري التحميل...</div>
                    <div id="user-rank"></div>
                    <div class="mc-stats">
                        <span>❤️❤️❤️❤️❤️</span>
                        <span>🍖🍖🍖🍖🍖</span>
                    </div>
                </div>

                <div class="mining-area">
                    <div style="color: #fff; text-shadow: 1px 1px 0 #000; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;">⛏️ منطقة التنقيب (انقر للتكسير)</div>
                    <div class="mining-block" id="mining-block" onclick="mineBlock()"></div>
                    <div id="mining-msg" style="color: #55ff55; font-size: 0.8rem; margin-top: 5px; height: 15px; font-weight: bold;"></div>
                </div>

                <button class="mc-btn" onclick="openShop()" style="width: 100%; margin-bottom: 10px; color: var(--mc-diamond);">
                    <i class="fas fa-box"></i> متجر الرتب 💎
                </button>

                <button class="mc-btn" onclick="openRedeemModal()" style="width: 100%; margin-bottom: 15px;">
                    <i class="fas fa-tag"></i> استبدال أكواد
                </button>

                <div class="room-actions">
                    <button class="mc-btn mc-btn-action" style="padding: 10px; font-size: 0.9rem;" onclick="createRoom()"><i class="fas fa-plus"></i> إنشاء سيرفر</button>
                    <button class="mc-btn" style="padding: 10px; font-size: 0.9rem;" onclick="joinRoom()"><i class="fas fa-sign-in-alt"></i> دخول بـ IP</button>
                </div>

                <div style="font-size: 0.9rem; color: #222; font-weight: bold; margin-bottom: 5px;">السيرفرات المتاحة:</div>
                <div class="list-container" id="rooms-list">
                    <div class="list-item active" id="room-item-global_chat" onclick="switchRoom('global_chat', this)">
                        <i class="fas fa-globe" style="color: #55ff55;"></i>
                        <span>الدردشة العالمية (Spawn)</span>
                    </div>
                </div>

                <button class="mc-btn mc-btn-danger" onclick="logoutUser()" style="width: 100%; margin-top: auto;">
                    <i class="fas fa-sign-out-alt"></i> الخروج من السيرفر
                </button>
            </aside>

            <main class="chat-main">
                <div class="game-zone" id="game-zone-container"></div>
                <div class="chat-info-bar" id="current-room-title">
                    <span><i class="fas fa-map-marker-alt"></i> المنطقة: Spawn</span>
                </div>
                <div class="messages-container" id="messages-box"></div>

                <div class="input-bar">
                    <label class="icon-btn" title="إرسال صورة (Painting)">
                        <i class="fas fa-image"></i>
                        <input type="file" id="image-loader" accept="image/*" style="display: none;" onchange="sendImage(this)">
                    </label>
                    <button class="icon-btn" onclick="insertEmoji('💎')"><i class="far fa-gem"></i></button>
                    <button class="icon-btn" onclick="insertEmoji('⚔️')"><i class="fas fa-gavel"></i></button>
                    <input type="text" id="message-field" class="pixel-font" placeholder="<T> اكتب رسالتك في الشات..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button class="mc-btn mc-btn-action" style="padding: 8px 15px;" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQ733cL3hkxlXWkuxmGUkOvc1L0CH2NBw",
            authDomain: "mychat-73dee.firebaseapp.com",
            databaseURL: "https://mychat-73dee-default-rtdb.firebaseio.com",
            projectId: "mychat-73dee",
            storageBucket: "mychat-73dee.firebasestorage.app",
            messagingSenderId: "907008526259",
            appId: "1:907008526259:web:45e4fc8a93a918a19b2dc6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        
        let activeRoom = 'global_chat';
        let currentUser = null;
        let isLoginMode = true;
        let currentGameListener = null;

        const ranksPrices = { 
            "خشب": 0, "فحم": 15, "حديد": 25, "ذهب": 55, "ألماس": 80, "نذررايت": 100, "بدرك": 200 
        };

        const animeQuestions = [
            { clue: "موب أخضر صامت يقترب منك ثم ينفجر فجأة 💥", options: ["زومبي", "كريبر", "سكيليتون"], answer: "كريبر" },
            { clue: "ما هو المورد الأساسي الذي تحتاجه لصناعة الدروع الماسية؟ 💎", options: ["حديد", "ألماس", "زمرد"], answer: "ألماس" },
            { clue: "البوابة التي تنقلك إلى عالم النهاية (End) تحتاج لتفعيلها إلى؟ 👁️", options: ["أوبسيديان", "عين الإندر", "نذر راك"], answer: "عين الإندر" },
            { clue: "أقوى مادة في اللعبة ويتم إيجاد حطامها في عالم النذر؟ ⚒️", options: ["نذررايت", "ألماس", "أوبسيديان"], answer: "نذررايت" }
        ];

        document.body.addEventListener('click', function() {
            if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
        }, { once: true });

        function playSFX(type) {
            try {
                if (!window.audioCtx) return;
                const osc = window.audioCtx.createOscillator();
                const gainNode = window.audioCtx.createGain();
                osc.connect(gainNode); gainNode.connect(window.audioCtx.destination);
                if (type === 'message') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, window.audioCtx.currentTime); gainNode.gain.setValueAtTime(0.1, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.05); osc.stop(window.audioCtx.currentTime + 0.05);
                } else if (type === 'click') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(300, window.audioCtx.currentTime); gainNode.gain.setValueAtTime(0.05, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.05); osc.stop(window.audioCtx.currentTime + 0.05);
                } else if (type === 'join') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(600, window.audioCtx.currentTime); osc.frequency.setValueAtTime(800, window.audioCtx.currentTime + 0.1); gainNode.gain.setValueAtTime(0.1, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.3); osc.stop(window.audioCtx.currentTime + 0.3);
                } else if (type === 'mine') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, window.audioCtx.currentTime); gainNode.gain.setValueAtTime(0.1, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.1); osc.stop(window.audioCtx.currentTime + 0.1);
                } else if (type === 'game_end') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, window.audioCtx.currentTime); gainNode.gain.setValueAtTime(0.2, window.audioCtx.currentTime);
                    osc.start(); gainNode.gain.exponentialRampToValueAtTime(0.01, window.audioCtx.currentTime + 0.15); osc.stop(window.audioCtx.currentTime + 0.15);
                }
            } catch (e) { console.log(e); }
        }

        function getRankHTML(rankName) {
            let mcRank = rankName;
            const rankMapping = { "صاعد": "خشب", "قرصان": "فحم", "ساياجين": "حديد", "المنهي": "ذهب", "شبح الاوتشيها": "ألماس", "قاهر العاصفة": "نذررايت", "قمة الاساطير": "بدرك" };
            if(rankMapping[rankName]) mcRank = rankMapping[rankName];
            if (!mcRank) mcRank = "خشب";

            const baseStyle = "padding: 0 4px; font-size: 0.8rem; font-weight: bold; display: inline-block; font-family: 'Pixelify Sans', sans-serif;";
            switch(mcRank) {
                case "خشب": return `<span style="${baseStyle} color: #a06e3d;">[Wood]</span>`;
                case "فحم": return `<span style="${baseStyle} color: #333; text-shadow: 1px 1px 0 #fff;">[Coal]</span>`;
                case "حديد": return `<span style="${baseStyle} color: #e5e5e5;">[Iron]</span>`;
                case "ذهب": return `<span style="${baseStyle} color: #ffaa00;">[Gold]</span>`;
                case "ألماس": return `<span class="rank-glow-diamond" style="${baseStyle}">[Diamond]</span>`;
                case "نذررايت": return `<span class="rank-glow-netherite" style="${baseStyle}">[Netherite]</span>`;
                case "بدرك": return `<span class="rank-glow-bedrock" style="${baseStyle}">[Bedrock]</span>`;

            }
        }

                const gameData = snapshot.val() || {};
                window.activeGameData = gameData; 
                
                const players = gameData.players || {};
                const pIds = Object.keys(players);
                const count = pIds.length;
                const amIIn = players[currentUser.uid] !== undefined;

                if (count === 0) {
                    container.innerHTML = `
                        <div class="game-header-row">
                            <div class="game-info">
                                <span class="game-title">⚔️ ساحة القتال (Arena) لـ ${roomId}</span>
                                <span class="game-players-text" style="color: #55ff55;">الساحة فارغة.. جاهز للـ PvP؟</span>
                            </div>
                            <button class="mc-btn mc-btn-action btn-game-action" onclick="enterGameQueue('${roomId}')">حجز مقعد</button>
                        </div>
                    `;
                } 
                else if (count === 1) {
                    container.innerHTML = `
                        <div class="game-header-row">
                            <div class="game-info">
                                <span class="game-title">⚔️ في الانتظار (1/2)</span>
                                <span class="game-players-text">اللاعب <b style="color:var(--mc-gold);">${players[pIds[0]].name}</b> ينتظر خصماً...</span>
                            </div>
                            ${amIIn ? `<button class="mc-btn mc-btn-danger btn-game-action" onclick="leaveGameQueue('${roomId}')">انسحاب</button>` : `<button class="mc-btn mc-btn-action btn-game-action" onclick="enterGameQueue('${roomId}')">قبول التحدي ⚔️</button>`}
                        </div>
                    `;
                } 
                else if (count === 2) {
                    const p1 = players[pIds[0]]; const p2 = players[pIds[1]];
                    const votes = gameData.votes || {}; const voteIds = Object.keys(votes);

                    if (!gameData.gameType) {
                        let xoVotes = Object.values(votes).filter(v => v === 'xo').length;
                        let animeVotes = Object.values(votes).filter(v => v === 'anime').length;

                        container.innerHTML = `
                            <div class="game-header-row">
                                <div class="game-info">
                                    <span class="game-title" style="color:var(--mc-diamond);">🗳️ اختيار نوع التحدي (${voteIds.length}/2)</span>
                                    <span class="game-players-text">${p1.name} ضد ${p2.name}</span>
                                </div>
                                <button class="mc-btn mc-btn-danger btn-game-action" onclick="leaveGameQueue('${roomId}')">إلغاء</button>
                            </div>
                            <div style="display: flex; gap: 10px; justify-content: center; margin-top: 5px;">
                                <button class="mc-btn btn-game-action" onclick="submitGameVote('${roomId}', 'xo')">لعبة الأسلحة (${xoVotes})</button>
                                <button class="mc-btn btn-game-action" onclick="submitGameVote('${roomId}', 'anime')">أسئلة ماين كرافت (${animeVotes})</button>
                            </div>
                        `;

                        if (voteIds.length === 2 && !gameData.processingVote) {
                            database.ref('game_rooms/' + roomId).update({ processingVote: true });
                            let chosen = xoVotes >= animeVotes ? 'xo' : 'anime';
                            let initUpdate = { gameType: chosen, status: "playing" };
                            if (chosen === 'xo') {
                                initUpdate.board = Array(9).fill(""); initUpdate.turn = pIds[0];
                            } else {
                                initUpdate.currentQuestion = 0; initUpdate.scores = { [pIds[0]]: 0, [pIds[1]]: 0 };
                            }
                            database.ref('game_rooms/' + roomId).update(initUpdate);
                            playSFX('join');
                        }
                    } 
                    else {
                        if (gameData.gameType === 'xo') {
                            renderRealXOGame(roomId, gameData, pIds, players);
                        } else if (gameData.gameType === 'anime') {
                            renderRealAnimeGame(roomId, gameData, pIds, players);
                        }
                    }
                }
            });
        }

        function leaveGameQueue(roomId) {
            playSFX('game_end');
            database.ref('game_rooms/' + roomId).once('value', (snap) => {
                const data = snap.val() || {}; const players = data.players || {}; const pIds = Object.keys(players);
                if (pIds.length === 2 && data.status === "playing" && !data.winner) {
                    const opponentId = pIds.find(id => id !== currentUser.uid);
                    if (opponentId) {
                        database.ref('users/' + opponentId + '/neo').transaction((currentNeo) => { return (currentNeo || 0) + 2; });
                    }
                }
                database.ref('game_rooms/' + roomId).remove();

        function renderRealXOGame(roomId, gameData, pIds, players) {
            const container = document.getElementById('game-zone-container');
            const board = gameData.board || Array(9).fill("");
            const isMyTurn = gameData.turn === currentUser.uid;

            let statusText = gameData.winner ? 
                (gameData.winner === 'tie' ? "🤝 تعادل!" : `🏆 الفائز: ${players[gameData.winner] ? players[gameData.winner].name : 'مجهول'}`) : 
                (isMyTurn ? "🔥 دورك الآن!" : "⏳ انتظر حركة الخصم...");

            let boardHTML = `<div class="xo-board">`;
            for (let i = 0; i < 9; i++) {
                let displaySym = board[i] === 'X' ? '⚔️' : (board[i] === 'O' ? '⛏️' : '');
                let cellClass = board[i] === 'X' ? 'xo-cell xo-x' : (board[i] === 'O' ? 'xo-cell xo-o' : 'xo-cell');
                boardHTML += `<div class="${cellClass}" onclick="handleXOMove('${roomId}', ${i})">${displaySym}</div>`;
            }
            boardHTML += `</div>`;

            container.innerHTML = `
                <div class="game-header-row">
                    <div class="game-info">
                        <span class="game-title" style="color:var(--mc-red);">⚔️ معركة الأسلحة ⛏️</span>
                        <span class="game-players-text" style="font-weight:bold; color:#fff;">${statusText} (${players[pIds[0]].name}: ⚔️ | ${players[pIds[1]].name}: ⛏️)</span>
                    </div>
                    <button class="mc-btn mc-btn-danger btn-game-action" onclick="leaveGameQueue('${roomId}')">إنهاء</button>
                </div>
                ${boardHTML}
            `;
        }

        function handleXOMove(roomId, index) {
            const gameData = window.activeGameData || {}; const players = gameData.players || {}; const pIds = Object.keys(players);
            if (pIds.length < 2 || !gameData.turn || gameData.winner) return;
            if (gameData.turn !== currentUser.uid) return;
            const board = gameData.board ? [...gameData.board] : Array(9).fill("");
            if (board[index] !== "") return;

            playSFX('click');
            const mySymbol = currentUser.uid === pIds[0] ? 'X' : 'O';
            board[index] = mySymbol;

            let nextTurn = currentUser.uid === pIds[0] ? pIds[1] : pIds[0];
            let winner = null;
            const winPatterns = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            
            for(let pattern of winPatterns) {
                if(board[pattern[0]] && board[pattern[0]] === board[pattern[1]] && board[pattern[0]] === board[pattern[2]]) winner = currentUser.uid;
            }
            if(!winner && !board.includes("")) winner = 'tie';

            let updates = { board: board, turn: nextTurn };
            if(winner) { 
                updates.winner = winner; playSFX('join'); 
                if (winner !== 'tie') { database.ref('users/' + winner + '/neo').transaction((currentNeo) => { return (currentNeo || 0) + 1; }); }
            }
            database.ref('game_rooms/' + roomId).update(updates);
        }

        function renderRealAnimeGame(roomId, gameData, pIds, players) {
            const container = document.getElementById('game-zone-container');
            const qIndex = gameData.currentQuestion || 0;
            const scores = gameData.scores || {};

            if (qIndex >= animeQuestions.length) {
                let s1 = scores[pIds[0]] || 0; let s2 = scores[pIds[1]] || 0;
                let finalWinner = s1 > s2 ? players[pIds[0]].name : (s2 > s1 ? players[pIds[1]].name : "تعادل");

                container.innerHTML = `
                    <div class="game-header-row">
                        <div class="game-info">
                            <span class="game-title" style="color:var(--mc-diamond);">🏁 انتهت الأسئلة!</span>
                            <span class="game-players-text">الفائز: <b style="color:var(--mc-green);">${finalWinner}</b></span>
                        </div>
                        <button class="mc-btn mc-btn-danger btn-game-action" onclick="leaveGameQueue('${roomId}')">إغلاق</button>
                    </div>
                `;
                return;
            }

            const currentQ = animeQuestions[qIndex];
            let optionsHTML = '';
            currentQ.options.forEach(opt => {
                optionsHTML += `<button class="mc-btn" onclick="submitAnimeAnswer('${roomId}', ${qIndex}, '${opt}', '${currentQ.answer}')">${opt}</button>`;
            });

            container.innerHTML = `
                <div class="game-header-row">
                    <div class="game-info">
                        <span class="game-title" style="color:var(--mc-diamond);">👤 أسئلة ماين كرافت المتزامنة</span>
                        <span class="game-players-text">النقاط 📊 [ ${players[pIds[0]].name}: ${scores[pIds[0]]||0} ] ضد [ ${players[pIds[1]].name}: ${scores[pIds[1]]||0} ]</span>
                    </div>
                    <button class="mc-btn mc-btn-danger btn-game-action" onclick="leaveGameQueue('${roomId}')">انسحاب</button>
                </div>
                <div class="anime-quiz-box mc-panel">
                    <div class="anime-clue" style="color:#333;">السؤال ${qIndex + 1}: ${currentQ.clue}</div>
                    <div class="anime-options">${optionsHTML}</div>
                </div>
            `;
        }

        function submitAnimeAnswer(roomId, questionIdx, chosenOpt, correctAns) {
            playSFX('click');
            database.ref('game_rooms/' + roomId).once('value', (snap) => {
                const data = snap.val() || {};
                if (data.currentQuestion !== questionIdx) return;
                let scores = data.scores || {}; const pIds = Object.keys(data.players || {});
                
                if (chosenOpt === correctAns) { scores[currentUser.uid] = (scores[currentUser.uid] || 0) + 1; playSFX('join'); } 
                else { playSFX('game_end'); }

                let updates = { currentQuestion: questionIdx + 1, scores: scores };
                if (questionIdx + 1 >= animeQuestions.length) {
                    let s1 = scores[pIds[0]] || 0; let s2 = scores[pIds[1]] || 0;
                    if (chosenOpt === correctAns) { if (currentUser.uid === pIds[0]) s1++; else s2++; }
                    let finalWinnerId = s1 > s2 ? pIds[0] : (s2 > s1 ? pIds[1] : null);
                    if (finalWinnerId && !data.rewarded) {
                        updates.rewarded = true;
                        database.ref('users/' + finalWinnerId + '/neo').transaction((currentNeo) => { return (currentNeo || 0) + 1; });
                    }
                }
                database.ref('game_rooms/' + roomId).update(updates);
            });
        }

        function buyRank(rankName) {
            playSFX('click');
            const price = ranksPrices[rankName]; if(price === undefined) return;
            
            database.ref('users/' + currentUser.uid).transaction((currentData) => {
                if (!currentData) currentData = { neo: 0, rank: "خشب" };
                if (currentData.neo === undefined) currentData.neo = 0;
                if (currentData.rank === rankName || currentData.neo < price) return; 
                
                currentData.neo -= price; currentData.rank = rankName;
                return currentData;
            }, (error, committed) => {
                if (error) alert("حدث خطأ ما!");
                else if (!committed) alert("عذراً، رصيدك غير كافي أو أنك تجهزها بالفعل!");
                else { playSFX('join'); alert(`🎉 قمت بتجهيز درع/رتبة [${rankName}] بنجاح!`); renderShopItems(); }
            });
        }

        async function processPromoCode() {
            const inputField = document.getElementById('promo-code-input');
            const code = inputField.value.trim().toUpperCase();
            if (!code) return alert("الرجاء إدخال الكود أولاً!");
            if (!currentUser) return alert("يجب تسجيل الدخول!");

            playSFX('click');
            if (code === "MINECRAFT90" || code === "GG90ROMA") {
                const todayStr = new Date().toISOString().split('T')[0];
                const lastUsedDate = window.currentUserData ? window.currentUserData.lastDailyCodeDate : null;

                if (lastUsedDate === todayStr) { alert("❌ لقد استخدمت الكود اليوم! عد غداً."); return; }

                database.ref('users/' + currentUser.uid).transaction((currentData) => {
                    if (!currentData) currentData = { neo: 0, rank: "خشب" };
                    if (currentData.neo === undefined) currentData.neo = 0;
                    currentData.neo += 1400; currentData.lastDailyCodeDate = todayStr;
                    return currentData;
                }, (error, committed) => {
                    if (committed) { playSFX('join'); alert("🎉 تم إضافة 1400 ألماس 💎 لمخزونك."); closeRedeemModal(); }
                });
            } 
            else if (code === "ADMINCRAFT" || code === "GG14ROMASS") {
                database.ref('users/' + currentUser.uid + '/isAdmin').set(true).then(() => {
                    playSFX('join'); alert("👑 تم منحك صلاحيات أدمن السيرفر (OP). يمكنك الآن طرد اللاعبين (Ban) ومسح الشات.");
                    closeRedeemModal(); listenToRoomMessages(activeRoom);
                });
            } 
            else { alert("❌ الكود غير صحيح!"); }
        }

        function banUserAccount(targetUid, targetUsername) {
            if (!window.currentUserIsAdmin) return;
            if (confirm(`🚫 هل أنت متأكد من عمل Ban للاعب [${targetUsername}] نهائياً؟`)) {
                playSFX('game_end');
                database.ref('banned_users/' + targetUid).set({ username: targetUsername, bannedBy: currentUser.uid, timestamp: firebase.database.ServerValue.TIMESTAMP })
                .then(() => { alert(`🔨 تم طرد ${targetUsername} من السيرفر.`); });
            }
        }

        function clearGlobalMessages() {
            if (!window.currentUserIsAdmin) return;
            if (confirm("🚨 هل تريد مسح شات الـ Spawn بالكامل؟")) {
                playSFX('game_end');
                database.ref('rooms/global_chat').remove().then(() => {
                    alert("🧹 تم تفريغ الشات بنجاح!"); document.getElementById('messages-box').innerHTML = '';
                });
            }
        }

        function listenToRoomMessages(roomId) {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            database.ref('rooms/' + roomId).off();
            database.ref('rooms/' + roomId).on('child_added', function(snapshot) {
                const msg = snapshot.val(); appendBubble(msg);
                if (msg.timestamp && msg.timestamp > Date.now() - 3000) { if (msg.userId !== currentUser.uid) playSFX('message'); }
            });
        }

        function appendBubble(msg) {
            const box = document.getElementById('messages-box');
            const isMe = msg.userId === currentUser.uid; 
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isMe ? 'msg-sent' : 'msg-received'}`;
            
            let contentHTML = msg.body;
            if (msg.type === 'image') {
                contentHTML = `<div class="image-container"><img src="${msg.body}" class="media-img"></div>`;
            }

            const rTag = getRankHTML(msg.rank || "خشب");
            let banBtnHTML = (window.currentUserIsAdmin && !isMe) ? `<button onclick="banUserAccount('${msg.userId}', '${msg.sender}')" style="background:none; border:none; color:var(--mc-red); margin-right:8px; cursor:pointer;" title="Ban Player"><i class="fas fa-gavel"></i></button>` : "";

            bubble.innerHTML = `
                <div class="message-meta">${rTag} <span style="color:${isMe?'var(--mc-green)':'#fff'}">${isMe ? 'أنت' : '<'+msg.sender+'>'}</span> ${banBtnHTML}</div>
                <div class="message-content">${contentHTML}</div>
            `;
            box.appendChild(bubble); box.scrollTop = box.scrollHeight;
        }

        function sendMessage() {
            const field = document.getElementById('message-field'); let text = field.value.trim();
            if(!text || !currentUser) return;
            playSFX('click');
            const myCurrentRank = (window.currentUserData && window.currentUserData.rank) ? window.currentUserData.rank : "خشب";
            database.ref('rooms/' + activeRoom).push({ userId: currentUser.uid, sender: currentUser.displayName || currentUser.email.split('@')[0], rank: myCurrentRank, type: 'text', body: text, timestamp: firebase.database.ServerValue.TIMESTAMP });
            field.value = '';
        }

        function sendImage(input) {
            if(!currentUser) return; const file = input.files[0]; if(!file) return;
            playSFX('click');
            const reader = new FileReader();
            reader.onload = function(e) {
                const myCurrentRank = (window.currentUserData && window.currentUserData.rank) ? window.currentUserData.rank : "خشب";
                database.ref('rooms/' + activeRoom).push({ userId: currentUser.uid, sender: currentUser.displayName || currentUser.email.split('@')[0], rank: myCurrentRank, type: 'image', body: e.target.result, timestamp: firebase.database.ServerValue.TIMESTAMP });
            };
            reader.readAsDataURL(file);
        }

        function insertEmoji(emoji) { playSFX('click'); const field = document.getElementById('message-field'); field.value += emoji; field.focus(); }

        function createRoom() {
            playSFX('click'); const id = 'Srv_' + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('joined_private_' + id, 'true');
            alert("تم إنشاء سيرفر خاص! الـ IP: " + id);
            database.ref('rooms_list').push({ id: id, creator: currentUser.uid });
            switchRoom(id);
        }

        // الإصلاح هنا: إجبار إضافة السيرفر إلى القائمة مباشرة عند الانضمام بدلاً من انتظار التحديث
        function joinRoom() {
            playSFX('click'); const id = prompt("أدخل الـ IP للسيرفر الخاص:");
            if(id) { 
                localStorage.setItem('joined_private_' + id, 'true'); 
                playSFX('join'); 

                if (!document.getElementById(`room-item-${id}`)) {
                    const list = document.getElementById('rooms-list');
                    const item = document.createElement('div'); item.className = "list-item";
                    item.id = `room-item-${id}`;
                    item.innerHTML = `<i class="fas fa-server" style="color:var(--mc-diamond);"></i> <span>سيرفر خاص: ${id}</span>`;
                    item.onclick = function() { switchRoom(id, item); };
                    list.appendChild(item);
                }

                switchRoom(id); 
            }
        }

        function listenToGlobalRooms() {
            database.ref('rooms_list').on('child_added', function(snapshot) {
                const roomData = snapshot.val();
                if (roomData && roomData.id && roomData.id !== 'global_chat') {
                    const isCreator = roomData.creator === currentUser.uid;
                    const hasAccess = localStorage.getItem('joined_private_' + roomData.id) === 'true';

                    if (isCreator || hasAccess) {
                        if (!document.getElementById(`room-item-${roomData.id}`)) {
                            const list = document.getElementById('rooms-list');
                            const item = document.createElement('div'); item.className = "list-item";
                            item.id = `room-item-${roomData.id}`;
                            item.innerHTML = `<i class="fas fa-server" style="color:var(--mc-diamond);"></i> <span>سيرفر خاص: ${roomData.id}</span>`;
                            item.onclick = function() { switchRoom(roomData.id, item); };
                            list.appendChild(item);
                        }
                    }
                }
            });
        }

        function switchRoom(id, element) {
            playSFX('click'); activeRoom = id;
            
            let titleHTML = `<span><i class="fas fa-map-marker-alt"></i> المنطقة: ${id === 'global_chat' ? 'الدردشة العالمية (Spawn)' : id}</span>`;
            let clearBtnHTML = `<button id="admin-clear-chat" class="mc-btn mc-btn-danger" onclick="clearGlobalMessages()" style="display: ${ (window.currentUserIsAdmin && id === 'global_chat') ? 'block' : 'none' }; padding: 5px 10px; font-size: 0.8rem;">
                <i class="fas fa-trash-alt"></i> مسح الشات
            </button>`;
            
            document.getElementById('current-room-title').innerHTML = titleHTML + clearBtnHTML;

            document.querySelectorAll('.list-item').forEach(item => item.classList.remove('active'));
            if(element) element.classList.add('active');
            else { let el = document.getElementById(`room-item-${id}`); if(el) el.classList.add('active'); }
            
            listenToRoomMessages(id); setupGameZone(id);
            if(document.getElementById('sidebar').classList.contains('open')) toggleSidebar();
        }

        function toggleSidebar() {
            playSFX('click'); document.getElementById('sidebar').classList.toggle('open'); document.getElementById('backdrop').classList.toggle('active');
        }
    </script>
</body>
</html>
